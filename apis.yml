aid: tenantcloud
name: TenantCloud
description: Cloud-based property management platform with a REST API for managing
  rentals, tenants, leases, maintenance, accounting, and online rent payment processing.
  The API enables landlords, property managers, and developers to automate daily tasks
  and build integrations on top of the TenantCloud platform.
